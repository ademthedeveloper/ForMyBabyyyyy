<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>A Love Story Experience</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
      body, html { margin: 0; padding: 0; background-color: #000; width: 100%; height: 100%; overflow: hidden; }
      #root { width: 100%; height: 100%; position: relative; }
      #initial-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: black; display: flex; align-items: center; justify-content: center;
        z-index: 10000; color: #f43f5e; font-family: 'Dancing Script', cursive; font-size: 24px;
        transition: opacity 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">Preparing your story... ❤️</div>
    <div id="root"></div>
    <!-- Load React using the most stable relative path -->
    <script type="module" src="src/main.tsx"></script>
    <script>
      // Hide the loader once the app finishes rendering
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.style.opacity = '0';
          setTimeout(function() { if (loader) loader.remove(); }, 500);
        }, 1000);
      });
    </script>
  </body>
</html>
