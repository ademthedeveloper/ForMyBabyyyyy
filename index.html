<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>A Love Story Experience</title>
    <!-- Preconnect to Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
      /* Solid black background immediately */
      body, html { margin: 0; padding: 0; background-color: #000; width: 100%; height: 100%; overflow: hidden; }
      #root { width: 100%; height: 100%; }
      /* Loader inside root to show the file is at least loading */
      .pre-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: black; color: #f43f5e; font-family: 'Dancing Script', cursive; font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pre-loader">Loading your story... ❤️</div>
    </div>
    <!-- RELATIVE path is essential for mobile/refresh reliability -->
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
