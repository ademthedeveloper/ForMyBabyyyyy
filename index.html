<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>A Love Story Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
      /* Ensure the background is always black so there's no flash of white */
      body, html { margin: 0; padding: 0; background-color: #000; width: 100%; height: 100%; overflow: hidden; }
      #root { width: 100%; height: 100%; }
      /* Fallback text if the script fails to load */
      .fallback-text {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: white; font-family: sans-serif; text-align: center; z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="fallback-text">Loading Love Story...</div>
    </div>
    <!-- Relative path without leading slash is best for GH Pages + base: "./" -->
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
